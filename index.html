<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vevioz Enterprise Maintenance</title>

  <style>
    :root {
      --bg: #080808;
      --bg-soft: #111111;
      --card: rgba(22, 18, 14, 0.74);
      --text: #f7efe7;
      --muted: #c9b8a9;
      --orange: #b45309;
      --orange-light: #f59e0b;
      --border: rgba(245, 158, 11, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(180, 83, 9, 0.18), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(245, 158, 11, 0.12), transparent 30%),
        linear-gradient(135deg, #050505 0%, #0f0b08 48%, #050505 100%);
      overflow-x: hidden;
    }

    canvas#particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(24px, 6vw, 80px);
    }

    article {
      width: min(100%, 760px);
      padding: clamp(28px, 6vw, 58px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.82), rgba(20, 14, 10, 0.68));
      box-shadow:
        0 24px 90px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(180, 83, 9, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      text-align: center;
      overflow: hidden;
    }

    .brand {
      margin-bottom: 14px;
      color: #f59e0b;
      font-size: clamp(1rem, 2.8vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(245, 158, 11, 0.34);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 9px 14px;
      border: 1px solid rgba(245, 158, 11, 0.24);
      border-radius: 999px;
      color: #fed7aa;
      background: rgba(180, 83, 9, 0.12);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--orange-light);
      box-shadow: 0 0 18px var(--orange-light);
      animation: pulse 1.6s ease-in-out infinite;
    }

    h1 {
      margin-bottom: 18px;
      font-size: clamp(2.25rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #fff7ed, #f59e0b, #9a3412);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      max-width: 610px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: #1c1004;
      background: linear-gradient(135deg, #f59e0b, #b45309);
      box-shadow: 0 14px 34px rgba(180, 83, 9, 0.34);
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px rgba(245, 158, 11, 0.38);
    }

    .team {
      color: #f8d7b0;
      font-weight: 700;
    }

    .glow {
      position: absolute;
      width: 220px;
      height: 220px;
      right: -80px;
      bottom: -80px;
      border-radius: 50%;
      background: rgba(180, 83, 9, 0.22);
      filter: blur(18px);
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.55);
        opacity: 0.5;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 18px;
      }

      article {
        border-radius: 22px;
      }

      .badge {
        font-size: 0.72rem;
        letter-spacing: 0.06em;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      a.button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .badge::before {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>

  <main class="page">
    <article>
      <div class="glow"></div>
      <div class="brand">Vevioz Enterprise</div>
      <div class="badge">Maintenance Mode</div>

      <h1>We&rsquo;ll be <span>back soon</span></h1>

      <p class="subtitle">
        Sorry for the inconvenience. We&rsquo;re currently performing maintenance to improve your experience.
        If you need anything urgent, please contact us. The website will be back online shortly.
      </p>

      <div class="actions">
        <a class="button" href="mailto:#">Contact Us</a>
        <p class="team">&mdash; Vevioz Enterprise Team</p>
      </div>
    </article>
  </main>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width = 0;
    let height = 0;
    let animationFrame;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function resizeCanvas() {
      width = canvas.width = window.innerWidth * window.devicePixelRatio;
      height = canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      createParticles();
    }

    function getParticleCount() {
      const area = window.innerWidth * window.innerHeight;
      return Math.min(95, Math.max(36, Math.floor(area / 13000)));
    }

    function createParticles() {
      particles = Array.from({ length: getParticleCount() }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        radius: Math.random() * 2.2 + 0.8,
        speedX: (Math.random() - 0.5) * 0.35,
        speedY: (Math.random() - 0.5) * 0.35,
        alpha: Math.random() * 0.45 + 0.18
      }));
    }

    function drawParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      particles.forEach((particle, index) => {
        particle.x += particle.speedX;
        particle.y += particle.speedY;

        if (particle.x < 0 || particle.x > window.innerWidth) particle.speedX *= -1;
        if (particle.y < 0 || particle.y > window.innerHeight) particle.speedY *= -1;

        const gradient = ctx.createRadialGradient(
          particle.x,
          particle.y,
          0,
          particle.x,
          particle.y,
          particle.radius * 5
        );

        gradient.addColorStop(0, `rgba(245, 158, 11, ${particle.alpha})`);
        gradient.addColorStop(1, 'rgba(180, 83, 9, 0)');

        ctx.beginPath();
        ctx.fillStyle = gradient;
        ctx.arc(particle.x, particle.y, particle.radius * 5, 0, Math.PI * 2);
        ctx.fill();

        for (let j = index + 1; j < particles.length; j++) {
          const other = particles[j];
          const dx = particle.x - other.x;
          const dy = particle.y - other.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(180, 83, 9, ${0.18 * (1 - distance / 120)})`;
            ctx.lineWidth = 1;
            ctx.moveTo(particle.x, particle.y);
            ctx.lineTo(other.x, other.y);
            ctx.stroke();
          }
        }
      });

      animationFrame = requestAnimationFrame(drawParticles);
    }

    window.addEventListener('resize', resizeCanvas, { passive: true });
    resizeCanvas();

    if (!prefersReducedMotion) {
      drawParticles();
    }
  </script>
</body>
</html>
